<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- Mini mascote -->
  <g transform="scale(0.32) translate(0, -10)">
    <!-- Crista -->
    <ellipse cx="85" cy="28" rx="10" ry="16" fill="#ef4444" transform="rotate(-15 85 28)"/>
    <ellipse cx="100" cy="22" rx="10" ry="18" fill="#ef4444"/>
    <ellipse cx="115" cy="28" rx="10" ry="16" fill="#ef4444" transform="rotate(15 115 28)"/>
    <ellipse cx="100" cy="35" rx="22" ry="10" fill="#ef4444"/>
    <!-- Cabeça -->
    <ellipse cx="100" cy="82" rx="52" ry="50" fill="#fbbf24"/>
    <!-- Olhos -->
    <ellipse cx="79" cy="75" rx="15" ry="16" fill="white"/>
    <ellipse cx="79" cy="75" rx="9" ry="10" fill="#1d4ed8"/>
    <circle cx="82" cy="71" r="3" fill="white"/>
    <ellipse cx="121" cy="75" rx="15" ry="16" fill="white"/>
    <ellipse cx="121" cy="75" rx="9" ry="10" fill="#1d4ed8"/>
    <circle cx="124" cy="71" r="3" fill="white"/>
    <!-- Bico sorriso -->
    <ellipse cx="100" cy="98" rx="14" ry="9" fill="#f97316"/>
    <path d="M 88 100 Q 100 110 112 100" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Antena -->
    <line x1="100" y1="32" x2="100" y2="14" stroke="#60a5fa" stroke-width="3"/>
    <circle cx="100" cy="11" r="5" fill="#3b82f6"/>
    <!-- Corpo robô mini -->
    <rect x="70" y="130" width="60" height="45" rx="10" fill="#1d4ed8"/>
    <circle cx="100" cy="152" r="6" fill="#60a5fa"/>
  </g>

  <!-- Texto MENOSFRANGO -->
  <text x="90" y="38" font-family="Arial Black, Arial, sans-serif" font-weight="900"
    font-size="28" fill="#1d4ed8" letter-spacing="-1">MENOS</text>
  <text x="90" y="68" font-family="Arial Black, Arial, sans-serif" font-weight="900"
    font-size="28" fill="#f97316" letter-spacing="-1">FRANGO</text>

  <!-- Tagline -->
  <text x="91" y="78" font-family="Arial, sans-serif" font-size="9"
    fill="#64748b" letter-spacing="1">TREINO COM TECNOLOGIA</text>
</svg>
