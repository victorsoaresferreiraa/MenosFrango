<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Sombra suave -->
  <ellipse cx="100" cy="210" rx="45" ry="8" fill="#1d4ed8" opacity="0.15"/>

  <!-- CORPO DE ROBÔ -->
  <!-- Torso principal -->
  <rect x="62" y="130" width="76" height="62" rx="12" fill="#1d4ed8"/>
  <!-- Painel do torso -->
  <rect x="72" y="140" width="56" height="40" rx="8" fill="#1e40af"/>
  <!-- LED central -->
  <circle cx="100" cy="155" r="7" fill="#60a5fa"/>
  <circle cx="100" cy="155" r="4" fill="#bfdbfe"/>
  <!-- Botões do painel -->
  <circle cx="83" cy="170" r="4" fill="#3b82f6"/>
  <circle cx="100" cy="170" r="4" fill="#22c55e"/>
  <circle cx="117" cy="170" r="4" fill="#f59e0b"/>

  <!-- Braço esquerdo (levantado, comemorando) -->
  <rect x="34" y="118" width="28" height="14" rx="7" fill="#1d4ed8" transform="rotate(-40 48 125)"/>
  <!-- Mão esquerda -->
  <circle cx="26" cy="108" r="10" fill="#1d4ed8"/>
  <rect x="21" y="98" width="6" height="9" rx="3" fill="#60a5fa"/>
  <rect x="29" y="96" width="6" height="11" rx="3" fill="#60a5fa"/>
  <rect x="37" y="100" width="5" height="8" rx="2.5" fill="#60a5fa"/>

  <!-- Braço direito (levantado, comemorando) -->
  <rect x="138" y="118" width="28" height="14" rx="7" fill="#1d4ed8" transform="rotate(40 152 125)"/>
  <!-- Mão direita -->
  <circle cx="174" cy="108" r="10" fill="#1d4ed8"/>
  <rect x="169" y="98" width="6" height="9" rx="3" fill="#60a5fa"/>
  <rect x="162" y="96" width="6" height="11" rx="3" fill="#60a5fa"/>
  <rect x="158" y="100" width="5" height="8" rx="2.5" fill="#60a5fa"/>

  <!-- Pernas robóticas -->
  <rect x="72" y="190" width="22" height="20" rx="6" fill="#1e40af"/>
  <rect x="106" y="190" width="22" height="20" rx="6" fill="#1e40af"/>
  <!-- Pés -->
  <rect x="68" y="206" width="30" height="10" rx="5" fill="#1d4ed8"/>
  <rect x="102" y="206" width="30" height="10" rx="5" fill="#1d4ed8"/>

  <!-- PESCOÇO -->
  <rect x="88" y="118" width="24" height="16" rx="6" fill="#2563eb"/>
  <!-- Linhas de articulação -->
  <line x1="88" y1="123" x2="112" y2="123" stroke="#60a5fa" stroke-width="1.5" opacity="0.5"/>
  <line x1="88" y1="129" x2="112" y2="129" stroke="#60a5fa" stroke-width="1.5" opacity="0.5"/>

  <!-- CABEÇA GRANDE DE FRANGO (cartoon) -->
  <!-- Crista vermelha -->
  <ellipse cx="85" cy="28" rx="10" ry="16" fill="#ef4444" transform="rotate(-15 85 28)"/>
  <ellipse cx="100" cy="22" rx="10" ry="18" fill="#ef4444"/>
  <ellipse cx="115" cy="28" rx="10" ry="16" fill="#ef4444" transform="rotate(15 115 28)"/>
  <!-- Base da crista -->
  <ellipse cx="100" cy="35" rx="22" ry="10" fill="#ef4444"/>

  <!-- Cabeça principal -->
  <ellipse cx="100" cy="82" rx="52" ry="50" fill="#fbbf24"/>
  <!-- Sombra da bochecha -->
  <ellipse cx="68" cy="90" rx="14" ry="10" fill="#f59e0b" opacity="0.6"/>
  <ellipse cx="132" cy="90" rx="14" ry="10" fill="#f59e0b" opacity="0.6"/>

  <!-- Olho esquerdo -->
  <ellipse cx="79" cy="75" rx="15" ry="16" fill="white"/>
  <ellipse cx="79" cy="75" rx="10" ry="11" fill="#1d4ed8"/>
  <ellipse cx="79" cy="75" rx="6" ry="6" fill="#1e3a8a"/>
  <circle cx="82" cy="71" r="3" fill="white"/>
  <!-- Sobrancelha esquerda (levantada, animado) -->
  <path d="M 65 58 Q 79 50 93 56" stroke="#92400e" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Olho direito -->
  <ellipse cx="121" cy="75" rx="15" ry="16" fill="white"/>
  <ellipse cx="121" cy="75" rx="10" ry="11" fill="#1d4ed8"/>
  <ellipse cx="121" cy="75" rx="6" ry="6" fill="#1e3a8a"/>
  <circle cx="124" cy="71" r="3" fill="white"/>
  <!-- Sobrancelha direita (levantada, animado) -->
  <path d="M 107 56 Q 121 50 135 58" stroke="#92400e" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Bico -->
  <ellipse cx="100" cy="98" rx="14" ry="9" fill="#f97316"/>
  <path d="M 86 98 Q 100 112 114 98" fill="#ea580c"/>
  <!-- Sorriso dentro do bico -->
  <path d="M 90 100 Q 100 108 110 100" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Bochechas rosadas -->
  <ellipse cx="65" cy="92" rx="9" ry="6" fill="#fca5a5" opacity="0.6"/>
  <ellipse cx="135" cy="92" rx="9" ry="6" fill="#fca5a5" opacity="0.6"/>

  <!-- Antena de robô na cabeça -->
  <line x1="100" y1="32" x2="100" y2="14" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="11" r="5" fill="#3b82f6"/>
  <circle cx="100" cy="11" r="3" fill="#bfdbfe"/>

  <!-- Pequenas orelhas de frango -->
  <ellipse cx="48" cy="78" rx="8" ry="12" fill="#f59e0b" transform="rotate(-15 48 78)"/>
  <ellipse cx="152" cy="78" rx="8" ry="12" fill="#f59e0b" transform="rotate(15 152 78)"/>
</svg>
