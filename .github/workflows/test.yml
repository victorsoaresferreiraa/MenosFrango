name: Docker Build Test

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create .env file
        run: cp .env.example .env

      - name: Build and Start Containers
        run: |
          # Usamos --no-healthcheck para ignorar o status interno do Docker
          # e focar no teste real de conexão que faremos abaixo
          docker compose up -d --build
          
      - name: Wait for API to be ready
        run: |
          echo "⏳ Aguardando a API responder no endpoint /health..."
          # Tenta conectar por 60 segundos antes de desistir
          timeout 60s sh -c 'until curl -f http://localhost:8000/health; do echo "API ainda subindo..."; sleep 5; done'
          
      - name: Check Logs on Failure
        if: failure()
        run: |
          echo "❌ Falha detectada! Analisando as 'caixas pretas' (logs):"
          docker compose logs api
          docker compose logs db

      - name: Final Success Check
        run: |
          echo "🚀 API confirmada e operante!"
          curl -f http://localhost:8000/health