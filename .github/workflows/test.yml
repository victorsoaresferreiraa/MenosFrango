name: Docker Build Test

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create .env file
        run: cp .env.example .env

      - name: Build and Start Containers
        run: |
          docker compose up -d --build
          
      - name: Wait for API to be ready
        run: |
          echo "⏳ Aguardando a API subir (máximo 60s)..."
          # Tenta conectar na API por até 60 segundos
          timeout 60s sh -c 'until curl -f http://localhost:8000/health; do sleep 5; done'
          
      - name: Check Container Logs on Failure
        if: failure() # Só roda esse passo se algo acima der errado
        run: |
          echo "❌ O teste falhou! Mostrando logs para debug:"
          docker compose logs api
          docker compose logs db

      - name: Verify API Status
        run: curl -f http://localhost:8000/health