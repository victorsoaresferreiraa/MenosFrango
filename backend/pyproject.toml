[tool.ruff]
target-version = "py311"
line-length = 100
select = ["E", "W", "F", "I", "N", "UP"]
ignore = ["E501"]
exclude = ["alembic/"]

[tool.ruff.isort]
known-first-party = ["app"]

[tool.black]
line-length = 100
target-version = ["py311"]
exclude = "alembic/"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
